<svg xmlns="http://www.w3.org/2000/svg" width="1600" height="900" viewBox="0 0 1600 900">
  <!-- Hero illustration: the HeroStack isometric conveyor on warm paper -->
  <defs>
    <linearGradient id="hs-plate" x1="0" y1="0" x2="0" y2="1">
      <stop offset="0" stop-color="#1b1d23"/>
      <stop offset="1" stop-color="#101116"/>
    </linearGradient>
    <linearGradient id="hs-green-side" x1="0" y1="0" x2="1" y2="0">
      <stop offset="0" stop-color="#22c55e"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <linearGradient id="hs-badge" x1="0" y1="0" x2="1" y2="1">
      <stop offset="0" stop-color="#34d399"/>
      <stop offset="1" stop-color="#059669"/>
    </linearGradient>
    <filter id="hs-blur" x="-60%" y="-60%" width="220%" height="220%">
      <feGaussianBlur stdDeviation="16"/>
    </filter>
  </defs>

  <rect width="1600" height="900" fill="#faf8f2"/>
  <rect x="60" y="60" width="1480" height="780" fill="none" stroke="#e7e6e2" stroke-width="2"/>

  <g transform="translate(480,140) scale(2)">
    <!-- floor shadow -->
    <ellipse cx="160" cy="284" rx="120" ry="24" fill="#0a0a0b" opacity="0.08" filter="url(#hs-blur)"/>

    <!-- frame base plate -->
    <g transform="translate(160, 273) scale(1, 0.58) rotate(45)">
      <rect x="-92" y="-92" width="184" height="184" rx="38" fill="#0b0c10"/>
    </g>
    <g transform="translate(160, 258) scale(1, 0.58) rotate(45)">
      <rect x="-92" y="-92" width="184" height="184" rx="38" fill="url(#hs-plate)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    </g>

    <!-- motor housing plate -->
    <g transform="translate(160, 241) scale(1, 0.58) rotate(45)">
      <rect x="-92" y="-92" width="184" height="184" rx="38" fill="#0b0c10"/>
    </g>
    <g transform="translate(160, 226) scale(1, 0.58) rotate(45)">
      <rect x="-92" y="-92" width="184" height="184" rx="38" fill="url(#hs-plate)" stroke="rgba(255,255,255,0.07)" stroke-width="1"/>
    </g>

    <!-- roller + belt assembly -->
    <ellipse cx="160" cy="198" rx="100" ry="28" fill="rgb(52,211,153)" opacity="0.45" filter="url(#hs-blur)"/>
    <g transform="translate(160, 192) scale(1, 0.58) rotate(45)">
      <rect x="-84" y="-44" width="168" height="88" rx="44" fill="url(#hs-green-side)"/>
    </g>
    <g transform="translate(160, 182) scale(1, 0.58) rotate(45)">
      <rect x="-84" y="-44" width="168" height="88" rx="44" fill="url(#hs-badge)" stroke="rgba(255,255,255,0.25)" stroke-width="1"/>
      <rect x="-64" y="-26" width="128" height="52" rx="26" fill="none" stroke="#fff" stroke-width="3" opacity="0.85"/>
      <circle cx="-38" cy="0" r="12" fill="#fff"/>
      <circle cx="38" cy="0" r="12" fill="#fff"/>
      <circle cx="-38" cy="0" r="4" fill="#0b0c10" opacity="0.85"/>
      <circle cx="38" cy="0" r="4" fill="#0b0c10" opacity="0.85"/>
      <path d="M-18 0H18" stroke="#fff" stroke-width="3" stroke-linecap="round" stroke-dasharray="5 7" opacity="0.9"/>
    </g>

    <!-- brand plate -->
    <g transform="translate(160, 79) scale(1, 0.58) rotate(45)">
      <rect x="-92" y="-92" width="184" height="184" rx="38" fill="url(#hs-green-side)"/>
    </g>
    <g transform="translate(160, 64) scale(1, 0.58) rotate(45)">
      <rect x="-92" y="-92" width="184" height="184" rx="38" fill="#fafafa" stroke="#e4e4e7" stroke-width="1.2"/>
      <rect x="-34" y="-34" width="68" height="68" rx="16" fill="url(#hs-badge)"/>
      <rect x="-20" y="-11" width="40" height="22" rx="11" fill="none" stroke="#fff" stroke-width="4"/>
      <circle cx="-9" cy="0" r="4" fill="#fff"/>
      <circle cx="9" cy="0" r="4" fill="#fff"/>
    </g>

    <!-- dashed ghost plate -->
    <g transform="translate(160, 30) scale(1, 0.58) rotate(45)">
      <rect x="-92" y="-92" width="184" height="184" rx="38" fill="none" stroke="#b9bbc2" stroke-width="1.3" stroke-dasharray="5 7" opacity="0.75"/>
    </g>
  </g>
</svg>
